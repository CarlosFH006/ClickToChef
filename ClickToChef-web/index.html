<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickToChef — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-fondo min-h-screen flex items-center justify-center" data-page="login">

    <div class="w-full max-w-sm px-8 py-12">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <img src="assets/icons/logo-clicktochef.png" alt="ClickToChef" class="w-24 h-24 object-contain">
            <h1 class="text-3xl font-bold text-principal mt-4">ClickToChef</h1>
        </div>

        <!-- Formulario -->
        <div>
            <!-- Usuario -->
            <div id="wrap-usuario" class="border border-borde rounded-2xl px-4 py-3 mb-3 flex items-center bg-superficie transition-colors duration-150">
                <svg id="icon-usuario" class="w-6 h-6 mr-3 flex-shrink-0 text-secundario transition-colors duration-150"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <input type="text" id="usuario" placeholder="Nombre de usuario" autocomplete="username"
                       class="flex-1 bg-transparent text-principal text-base placeholder-secundario outline-none">
            </div>

            <!-- Contraseña -->
            <div id="wrap-contrasena" class="border border-borde rounded-2xl px-4 py-3 mb-3 flex items-center bg-superficie transition-colors duration-150">
                <svg id="icon-contrasena" class="w-6 h-6 mr-3 flex-shrink-0 text-secundario transition-colors duration-150"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <input type="password" id="contrasena" placeholder="Contraseña" autocomplete="current-password"
                       class="flex-1 bg-transparent text-principal text-base placeholder-secundario outline-none">
            </div>

            <div class="mt-2"></div>

            <!-- Botón login -->
            <button id="btn-login" disabled
                    class="w-full bg-primary text-white font-semibold py-4 px-4 rounded-2xl
                           flex items-center justify-center gap-3
                           hover:bg-blue-600 active:opacity-80 transition-colors duration-150
                           disabled:opacity-50 disabled:cursor-not-allowed">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                </svg>
                Iniciar sesión
            </button>
        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/services/websocket.js"></script>
    <script src="js/models/detallePedido.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/paginas/login.js"></script>
</body>
</html>
