version: '3.8'

services:
  db_app:
    image: mysql:8.0
    container_name: clicktochef_mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: adminDB
      MYSQL_DATABASE: clicktochef
    ports:
      - "3306:3306"
    volumes:
      - ./data/clicktochef.sql:/docker-entrypoint-initdb.d/clicktochef.sql
      - ./data/mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padminDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_odoo:
    image: postgres:15
    container_name: odoo_db_postgres
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - ./data/odoo_db_data:/var/lib/postgresql/data

  odoo:
    image: odoo:latest
    container_name: clicktochef_odoo
    depends_on:
      - db_odoo
    ports:
      - "8069:8069"
    environment:
      - HOST=db_odoo
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - ./data/odoo_web_data:/var/lib/odoo
      - ./extra-addons:/mnt/extra-addons
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    
  web-cocina:
    image: httpd:latest
    ports:
      - "8080:80"
    volumes:
      - ./ClickToChef-web:/usr/local/apache2/htdocs/

  backend:
    build:
      context: ./ClickToChef-Server
      dockerfile: Dockerfile
    container_name: clicktochef_backend
    depends_on:
      db_app:
        condition: service_healthy
      odoo:
        condition: service_healthy
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - ./ClickToChef-Server/config.properties:/app/config.properties